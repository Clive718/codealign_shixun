### model
model_name_or_path: /root/siton-tmp/assignment_A/sft/outputs/qwen3_code_full_sft
reward_model: /root/siton-tmp/assignment_A/dpo/outputs/qwen3_code_lora_rm_debug
reward_model_type: lora
trust_remote_code: true

### method
stage: ppo
do_train: true
finetuning_type: lora
lora_rank: 8
lora_alpha: 16
lora_dropout: 0.05
lora_target: all
ppo_target: 0.1

### dataset
dataset_dir: ./dpo/data
dataset: code_ppo_prompt_train
template: qwen
cutoff_len: 512
overwrite_cache: true
preprocessing_num_workers: 4
max_samples: 200

### output
output_dir: ./dpo/outputs/qwen3_code_lora_ppo_debug
logging_steps: 5
save_steps: 50
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
learning_rate: 1.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
max_grad_norm: 1.0
gradient_checkpointing: true
fp16: true
bf16: false
ddp_timeout: 180000000
resume_from_checkpoint: null

### generate
max_new_tokens: 256
top_k: 0
top_p: 0.9
temperature: 0.7
do_sample: true

### eval
eval_strategy: "no"