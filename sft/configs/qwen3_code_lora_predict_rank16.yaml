### model
model_name_or_path: ./Qwen3-1.7B
trust_remote_code: true

### method
stage: sft
do_predict: true
finetuning_type: lora

### LoRA
adapter_name_or_path: ./sft/outputs/qwen3_code_lora_epo500

### dataset
dataset_dir: ./sft/data
eval_dataset: mbpp_sanitized_test
template: qwen3
cutoff_len: 1024
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 2

### output
output_dir: ./sft/outputs/qwen3_code_lora_predict_epo500
overwrite_output_dir: true
report_to: none

### generation
per_device_eval_batch_size: 2

predict_with_generate: true

max_new_tokens: 256
do_sample: false
repetition_penalty: 1.1

num_beams: 1

fp16: true
ddp_timeout: 180000000