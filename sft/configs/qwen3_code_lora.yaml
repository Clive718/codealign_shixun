### model
model_name_or_path: ./Qwen3-1.7B
trust_remote_code: true

### method
stage: sft
do_train: true
finetuning_type: lora
compute_accuracy: true

### LoRA
lora_target: all
lora_rank: 32
lora_alpha: 64
lora_dropout: 0.05

### dataset
dataset_dir: ./sft/data
dataset: code_sft_train,mbpp_sanitized_train
eval_dataset: code_sft_valid,mbpp_sanitized_validation
template: qwen3
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 8
dataloader_num_workers: 8

### output
output_dir: ./sft/outputs/qwen3_code_lora
logging_steps: 5
save_steps: 200
save_total_limit: 2
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 3
lr_scheduler_type: cosine
warmup_ratio: 0.03
max_grad_norm: 1.0
gradient_checkpointing: true
fp16: true
bf16: false
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval during training
per_device_eval_batch_size: 2
eval_strategy: steps
eval_steps: 200